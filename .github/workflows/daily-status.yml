name: Daily Azure Billing and Health Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report-and-screenshot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Billing Parsing & Screenshot Script
      shell: pwsh
      run: |
        ./Query_Azure.ps1
      env:
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Commit and Push Latest Screenshots
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add docs/*.png
        
        git commit -m "Update daily live web snapshots [skip ci]" || exit 0
        git push

        sleep 5

    - name: Post Final Report to Slack
      shell: pwsh
      run: |
        $Payload = Get-Content -Raw -Path "slack_payload.json"
        Invoke-RestMethod -Method Post -Uri "${{ secrets.SLACK_WEBHOOK_URL }}" -Body $Payload -ContentType "application/json; charset=utf-8"

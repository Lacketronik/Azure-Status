name: Daily Azure Billing and Health Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report-and-screenshot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Billing Parsing & Screenshot Script
      shell: pwsh
      run: |
        ./Query_Azure.ps1
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Commit and Push Latest Screenshots
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if there are any new or updated screenshot images to push
        git add docs/*.png
        
        # Commit only if files changed, otherwise exit gracefully without breaking the build
        git commit -m "Update daily live web snapshots [skip ci]" || exit 0
        git push
